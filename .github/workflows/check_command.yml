name: 텔레그램 명령 체크

on:
  schedule:
    # 5분마다 실행 (한국 장 시간 + 아침·저녁 커버)
    - cron: '*/5 * * * *'
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 명령 체크 & 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_command.py

      - name: 상태 저장
        run: |
          git config user.name "semi-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json tg_offset.json
          git diff --staged --quiet || git commit -m "update state $(date -u +%Y-%m-%d-%H%M)"
          git pull --rebase
          git push
