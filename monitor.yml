name: 반도체 모니터

on:
  schedule:
    # 한국시간(KST) 평일 16:00 = UTC 07:00. 장 마감(15:30) 직후 종가 반영.
    - cron: '0 7 * * 1-5'
  workflow_dispatch:   # 수동 실행 버튼

# state.json 커밋을 위해 쓰기 권한 필요
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 모니터 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: 상태(고점·카운트) 저장
        run: |
          git config user.name "semi-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state $(date -u +%Y-%m-%d)"
          git push
